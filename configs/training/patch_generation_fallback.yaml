experiment_name: patch_generation_fallback
task_type: PatchGenerationLite
dataset_path: ./data/patch_generation_lite
output_dir: ./outputs/patch_generation_fallback

model_name: qwen_instruct
text_model_name: Qwen/Qwen2.5-0.5B-Instruct
load_pretrained: false
local_files_only: true
max_input_length: 256
max_target_length: 128
generation_max_new_tokens: 128
eval_generation_samples: 100

batch_size: 4
num_workers: 0
epochs: 2
learning_rate: 0.001
weight_decay: 0.0
gradient_clip_norm: 1.0
save_best_model: true
log_every_n_steps: 10
seed: 7
device: auto
