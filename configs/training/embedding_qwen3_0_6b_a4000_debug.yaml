experiment_name: qwen3_embedding_graph_text_a4000_debug
task_type: GraphTextRetrieval
dataset_path: ./data/embedding/graph_text_pairs
output_dir: ./outputs/qwen3_embedding_a4000_debug

text_model_name: Qwen/Qwen3-Embedding-0.6B
text_encoder_mode: qwen
freeze_text_encoder: true
max_text_length: 192

graph_feature_dim: 12
graph_hidden_dim: 128
embedding_dim: 1024
temperature: 0.07
hard_negative_margin: 0.1

batch_size: 4
num_workers: 0
epochs: 1
learning_rate: 0.001
weight_decay: 0.0001
gradient_clip_norm: 1.0

save_best_model: true
log_every_n_steps: 5
seed: 7
device: cuda
